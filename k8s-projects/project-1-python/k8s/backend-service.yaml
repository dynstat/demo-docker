# Backend Service — ClusterIP (internal only, frontend accesses via nginx proxy)
apiVersion: v1
kind: Service
metadata:
  name: python-backend-svc
  namespace: python-demo
  labels:
    app: python-backend
spec:
  type: ClusterIP
  selector:
    app: python-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
