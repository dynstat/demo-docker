server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to Spring Boot backend K8s Service
    # "springboot-backend-svc" is resolved via Kubernetes CoreDNS
    location /api/ {
        proxy_pass         http://springboot-backend-svc:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
